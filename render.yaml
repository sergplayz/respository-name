# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: matcom-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      # Comma-separated frontend URLs (your static site or local dev). Use * to allow any origin.
      - key: CORS_ORIGINS
        sync: false
