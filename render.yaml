# https://render.com/docs/blueprint-spec
# Use backend/ as the service root so `main.py` (tracked in git) is on PYTHONPATH.
# (The repo-root shim `main.py` is optional for local runs; it was often never pushed.)
services:
  - type: web
    name: matcom-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # `python -m uvicorn` uses the same interpreter as the build (avoids missing `uvicorn` on PATH).
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      # Comma-separated frontend URLs (your static site or local dev). Use * to allow any origin.
      - key: CORS_ORIGINS
        sync: false
      # Admin panel: username + JWT secret (≥16 chars) + password as either MATCOM_ADMIN_PASSWORD (Secret) or MATCOM_ADMIN_PASSWORD_BCRYPT
      - key: MATCOM_ADMIN_USERNAME
        sync: false
      - key: MATCOM_JWT_SECRET
        sync: false
      - key: MATCOM_ADMIN_PASSWORD
        sync: false
      - key: MATCOM_ADMIN_PASSWORD_BCRYPT
        sync: false
      # Optional: comma-separated sqlite table names hidden from public /api/tables, /rows, /search
      - key: MATCOM_PUBLIC_TABLE_DENYLIST
        sync: false
